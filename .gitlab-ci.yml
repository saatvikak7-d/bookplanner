stages:
  - test
  - build
  - deploy

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_REF_SLUG
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_REF_SLUG
  AI_SERVICE_IMAGE: $CI_REGISTRY_IMAGE/ai-service:$CI_COMMIT_REF_SLUG

# Cache node modules and maven repository
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - backend/.m2/repository
    - frontend/node_modules/

# --- Test Stage ---
test-backend:
  stage: test
  image: eclipse-temurin:21-jdk-alpine
  script:
    - cd backend
    - ./mvnw test -Dmaven.repo.local=.m2/repository || mvn test -Dmaven.repo.local=.m2/repository
  allow_failure: true

test-frontend:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run lint
  allow_failure: true

# --- Build Stage ---
build-docker-images:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Build & push frontend
    - docker build -t $FRONTEND_IMAGE ./frontend
    - docker push $FRONTEND_IMAGE
    
    # Build & push backend
    - docker build -t $BACKEND_IMAGE ./backend
    - docker push $BACKEND_IMAGE

    # Build & push ai-service
    - docker build -t $AI_SERVICE_IMAGE ./ai-service
    - docker push $AI_SERVICE_IMAGE

# --- Deploy Stage ---
deploy-to-server:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    # Transfer production docker-compose file to the server
    - scp docker-compose.prod.yml $SERVER_USER@$SERVER_IP:/opt/bookplanner/docker-compose.yml
    # Pull latest images and restart services on the target server
    - ssh $SERVER_USER@$SERVER_IP "
        cd /opt/bookplanner &&
        export FRONTEND_IMAGE=$FRONTEND_IMAGE &&
        export BACKEND_IMAGE=$BACKEND_IMAGE &&
        export AI_SERVICE_IMAGE=$AI_SERVICE_IMAGE &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker compose pull &&
        docker compose up -d --remove-orphans
      "
  environment:
    name: production
    url: http://$SERVER_IP
  rules:
    # Only run deploy if the SSH variables are configured in GitLab CI/CD settings
    - if: '$SSH_PRIVATE_KEY && $SERVER_IP && $SERVER_USER && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
